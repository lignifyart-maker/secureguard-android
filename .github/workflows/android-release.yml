name: Android Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Release title shown on GitHub
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve app version
        id: app_version
        shell: bash
        run: |
          tag="${{ steps.release_meta.outputs.tag }}"
          version_name="${tag#v}"
          IFS='.' read -r major minor patch <<< "$version_name"
          major="${major:-0}"
          minor="${minor:-0}"
          patch="${patch:-0}"
          version_code=$((major * 10000 + minor * 100 + patch))
          if [[ "$version_code" -le 0 ]]; then
            echo "Invalid version derived from tag: $tag" >&2
            exit 1
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Decode signing keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release-keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: >
          gradle
          assembleRelease
          -PappVersionName=${{ steps.app_version.outputs.version_name }}
          -PappVersionCode=${{ steps.app_version.outputs.version_code }}
          -PreleaseStoreFile=$RELEASE_STORE_FILE
          -PreleaseStorePassword=$RELEASE_STORE_PASSWORD
          -PreleaseKeyAlias=$RELEASE_KEY_ALIAS
          -PreleaseKeyPassword=$RELEASE_KEY_PASSWORD

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
